name: Generador Automatico de Sitemap SEO

on:
  push:
    paths:
      - 'Guias/**'
      - '*.html' # Se activa automáticamente si cambia cualquier archivo HTML en la raíz
      - '*.txt'  # Se activa también si tu archivo maestro es un archivo de texto .txt

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 16

    - name: Ejecutar script de mapeo masivo
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');
        const folderPath = path.join(process.cwd(), 'Guias');
        
        // 🔍 BUSCADOR INTELIGENTE: Si no halla index.html, rastrea tu archivo maestro real
        let htmlPath = path.join(process.cwd(), 'index.html');
        if (!fs.existsSync(htmlPath)) {
            const archivosEnRaiz = fs.readdirSync(process.cwd());
            const archivoMaestro = archivosEnRaiz.find(f => (f.endsWith('.html') || f.endsWith('.txt')) && !f.startsWith('.'));
            if (archivoMaestro) {
                htmlPath = path.join(process.cwd(), archivoMaestro);
                console.log('🤖 Robot: No encontré index.html, pero localicé y usaré: ' + archivoMaestro);
            }
        }

        const domain = 'https://jhseguros.mx';        
        let xml = '<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n';
        xml += '<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n';
        
        // 1. Registro de la página de inicio
        xml += '  <url>\n';
        xml += '    <loc>' + domain + '/</loc>\n';
        xml += '    <priority>1.0</priority>\n';
        xml += '  </url>\n';

        // 2. Inyección de tus secciones principales del Menú
        const seccionesFijas = ['danos', 'productos-vida', 'faq', 'hospitales', 'autorizaciones', 'certificaciones', 'recursos'];
        seccionesFijas.forEach(seccion => {
            xml += '  <url>\n';
            xml += '    <loc>' + domain + '/' + seccion + '</loc>\n';
            xml += '    <priority>0.9</priority>\n';
            xml += '  </url>\n';
        });

        // 🔥 3. ESCANEO MASIVO AUTOMATIZADO DE PREGUNTAS FRECUENTES
        if (fs.existsSync(htmlPath)) {
            const htmlContent = fs.readFileSync(htmlPath, 'utf8');
            const regex = /data-slug=\"([^\"]+)\"/g;
            let match;
            while ((match = regex.exec(htmlContent)) !== null) {
                const faqSlug = match[1];
                xml += '  <url>\n';
                xml += '    <loc>' + domain + '/faq/' + faqSlug + '</loc>\n';
                xml += '    <priority>0.8</priority>\n';
                xml += '  </url>\n';
            }
        }

        // 4. Registro dinámico de tus artículos de Google Sheets
        if (fs.existsSync(folderPath)) {
            const files = fs.readdirSync(folderPath);
            files.forEach(file => {
                if (file.endsWith('.md') && !file.startsWith('.')) {
                    const slug = file.replace('.md', '');
                    xml += '  <url>\n';
                    xml += '    <loc>' + domain + '/recursos/' + slug + '</loc>\n';
                    xml += '    <priority>0.8</priority>\n';
                    xml += '  </url>\n';
                }
            });
        }

        xml += '</set>'; // Nota: corregido cierre a urlset en string literal abajo
        xml = xml.replace('</set>', '</urlset>');
        fs.writeFileSync(path.join(process.cwd(), 'sitemap.xml'), xml);
        console.log('Sitemap.xml actualizado con éxito.');
        "

    - name: Commit and push sitemap
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 SEO: Automated sitemap update with FAQ Clean URLs [skip ci]"
        file_pattern: 'sitemap.xml'
