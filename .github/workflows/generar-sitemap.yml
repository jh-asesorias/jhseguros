name: Generador Automatico de Sitemap SEO

on:
  push:
    paths:
      - 'recursos/**/index.html' # Se activa al detectar nuevos index.html físicos inyectados por tu Sheet

permissions:
  contents: write # 👑 LA CLAVE: Otorga permisos físicos de escritura al robot para desbloquear el "git push"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 16

    - name: Ejecutar script de mapeo masivo
      run: |
        node -e "
        const fs = require('fs');
        const path = require('path');

        const folderPath = path.join(process.cwd(), 'recursos');
        const domain = 'https://jhseguros.mx';
        
        let xml = '<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n';
        xml += '<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n';
        
        // Registro de la página de inicio
        xml += '  <url>\n';
        xml += '    <loc>' + domain + '/</loc>\n';
        xml += '    <priority>1.0</priority>\n';
        xml += '  </url>\n';

        if (fs.existsSync(folderPath)) {
            const items = fs.readdirSync(folderPath);
            items.forEach(item => {
                const subPath = path.join(folderPath, item);
                if (fs.statSync(subPath).isDirectory()) {
                    if (fs.existsSync(path.join(subPath, 'index.html'))) {
                        xml += '  <url>\n';
                        xml += '    <loc>' + domain + '/recursos/' + encodeURIComponent(item) + '/</loc>\n';
                        xml += '    <priority>0.8</priority>\n';
                        xml += '  </url>\n';
                    }
                }
            });
        }

        xml += '</urlset>';
        fs.writeFileSync(path.join(process.cwd(), 'sitemap.xml'), xml);
        console.log('Sitemap.xml generado con éxito en la raíz para carpetas físicas.');
        "

    - name: Guardar y subir cambios al repositorio
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add sitemap.xml
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 SEO: Sitemap actualizado por automatización de carpetas físicas en Netlify" && git push origin HEAD:main)
